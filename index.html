<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Pending</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      color: white;
    }

    .alert-box {
      background: #1f2937;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 2px solid #ef4444;
    }

    .alert-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    h1 {
      color: #ef4444;
      margin-bottom: 15px;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #d1d5db;
    }

    .contact {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #fbbf24;
    }
  </style>
</head>
<body>

  <div class="alert-box">
    <div class="alert-icon">⚠️</div>
    <h1>Website Suspended</h1>
    <p>
      This website is temporarily unavailable because the website hosting
      cost has not been paid.
    </p>

    <div class="contact">
      For enquiries contact:<br />
      0105 641873
    </div>
  </div>

</body>
</html>
